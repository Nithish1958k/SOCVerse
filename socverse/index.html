<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOCVerse — Security Operations Center Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Chivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#070b14; --bg2:#0b1120; --panel:#0e1626; --panel2:#121d31; --line:#1d2c44;
  --line2:#27395a; --txt:#cfe0f5; --txt-dim:#7f93b3; --txt-faint:#536184;
  --cyan:#22d3ee; --cyan-dim:#0e7490; --green:#34e0a1; --amber:#f5b544;
  --crit:#ff4d6d; --high:#ff8a3d; --med:#f5b544; --low:#3da8ff; --info:#5b6b8c;
  --glow-crit:rgba(255,77,109,.45); --glow-cyan:rgba(34,211,238,.35);
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif; --disp:'Chivo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--txt); font-family:var(--sans);
  font-size:14px; overflow:hidden;
  background-image:
    radial-gradient(1200px 600px at 80% -10%, rgba(34,211,238,.06), transparent),
    radial-gradient(900px 500px at -10% 110%, rgba(52,224,161,.05), transparent),
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.012) 3px, transparent 4px);
}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--cyan-dim)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ============ LOGIN ============ */
#login{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(1000px 700px at 50% 30%, rgba(34,211,238,.08), transparent), var(--bg)}
.login-card{width:420px;max-width:92vw;background:linear-gradient(180deg,var(--panel),var(--bg2));
  border:1px solid var(--line2);border-radius:14px;padding:38px 34px;
  box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04)}
.login-logo{font-family:var(--disp);font-weight:900;font-size:34px;letter-spacing:-1px;
  background:linear-gradient(90deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.login-logo span{color:var(--green);-webkit-text-fill-color:var(--green)}
.login-sub{color:var(--txt-dim);font-family:var(--mono);font-size:12px;margin:6px 0 26px;letter-spacing:.5px}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--txt-faint);margin-bottom:7px;font-weight:600}
.fld input{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--txt);
  padding:11px 13px;border-radius:8px;font-size:14px;outline:none;transition:.15s}
.fld input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--glow-cyan)}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.role-opt{background:var(--bg);border:1px solid var(--line2);border-radius:8px;padding:11px 10px;text-align:center;
  transition:.15s;color:var(--txt-dim)}
.role-opt:hover{border-color:var(--line2);color:var(--txt)}
.role-opt.sel{border-color:var(--cyan);background:rgba(34,211,238,.08);color:var(--cyan);box-shadow:0 0 0 1px var(--cyan) inset}
.role-opt b{display:block;font-size:14px;font-weight:700}
.role-opt small{font-size:10px;color:var(--txt-faint)}
.btn-login{width:100%;margin-top:24px;background:linear-gradient(90deg,var(--cyan),var(--green));color:#03121a;
  border:none;padding:13px;border-radius:8px;font-weight:700;font-size:14px;letter-spacing:.5px;transition:.15s}
.btn-login:hover{filter:brightness(1.1);box-shadow:0 8px 24px var(--glow-cyan)}

/* ============ APP SHELL ============ */
#app{display:none;height:100vh;grid-template-columns:226px 1fr;grid-template-rows:54px 1fr}
.topbar{grid-column:1/3;display:flex;align-items:center;gap:18px;padding:0 18px;
  background:linear-gradient(180deg,var(--panel),var(--bg2));border-bottom:1px solid var(--line2);z-index:30}
.brand{font-family:var(--disp);font-weight:900;font-size:19px;letter-spacing:-.5px;color:#fff}
.brand span{color:var(--green)}
.brand .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);
  margin-right:9px;box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.top-stats{display:flex;gap:8px;margin-left:6px}
.tstat{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line);
  padding:5px 11px;border-radius:7px;font-family:var(--mono);font-size:12px}
.tstat b{font-weight:600}
.tstat .lbl{color:var(--txt-faint);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.clock{font-family:var(--mono);font-size:13px;color:var(--cyan)}
.user-chip{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line2);
  padding:5px 6px 5px 12px;border-radius:30px}
.user-chip .ava{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--green));
  display:flex;align-items:center;justify-content:center;color:#03121a;font-weight:700;font-size:12px}
.user-chip .meta{line-height:1.2}
.user-chip .meta b{font-size:12px}
.user-chip .meta small{font-size:10px;color:var(--txt-faint);font-family:var(--mono)}
.logout{background:none;border:1px solid var(--line2);color:var(--txt-dim);padding:6px 11px;border-radius:6px;font-size:12px}
.logout:hover{border-color:var(--crit);color:var(--crit)}

/* sidebar */
.sidebar{background:var(--bg2);border-right:1px solid var(--line);padding:14px 10px;overflow-y:auto;display:flex;flex-direction:column}
.nav-group{margin-bottom:16px}
.nav-group h6{font-size:9.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--txt-faint);
  padding:0 10px;margin-bottom:7px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;color:var(--txt-dim);
  font-size:13px;font-weight:500;cursor:pointer;transition:.12s;position:relative}
.nav-item:hover{background:var(--panel);color:var(--txt)}
.nav-item.active{background:rgba(34,211,238,.1);color:var(--cyan)}
.nav-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:3px;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.nav-item .ic{width:17px;text-align:center;flex-shrink:0;font-size:14px}
.nav-item .badge{margin-left:auto;background:var(--crit);color:#fff;font-size:10px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 0 10px var(--glow-crit)}
.nav-foot{margin-top:auto;padding:10px;font-family:var(--mono);font-size:10px;color:var(--txt-faint);line-height:1.6}

/* main */
.main{overflow-y:auto;padding:20px 24px 60px;position:relative}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.view-head h1{font-family:var(--disp);font-weight:800;font-size:25px;letter-spacing:-.5px;color:#fff}
.view-head .sub{color:var(--txt-dim);font-size:13px;margin-top:3px}
.view-head .crumb{font-family:var(--mono);font-size:11px;color:var(--cyan);letter-spacing:.5px;text-transform:uppercase}

/* cards & grids */
.grid{display:grid;gap:14px}
.kpi-row{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:11px;padding:16px}
.card.glow{border-color:var(--line2);box-shadow:0 0 0 1px rgba(34,211,238,.05),0 14px 40px rgba(0,0,0,.3)}
.card h3{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.card .ch-sub{font-size:11px;color:var(--txt-faint);margin-bottom:14px}
.kpi{position:relative;overflow:hidden}
.kpi .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--txt-faint);font-weight:600}
.kpi .val{font-family:var(--disp);font-weight:800;font-size:32px;margin-top:6px;line-height:1}
.kpi .delta{font-family:var(--mono);font-size:11px;margin-top:7px}
.kpi .spark{position:absolute;right:14px;top:14px;font-size:22px;opacity:.25}
.up{color:var(--green)}.down{color:var(--crit)}

/* tables */
.tbl-wrap{overflow:auto;border:1px solid var(--line);border-radius:11px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--bg2);text-align:left;padding:10px 12px;font-size:10px;text-transform:uppercase;
  letter-spacing:.8px;color:var(--txt-faint);font-weight:700;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:2}
tbody td{padding:9px 12px;border-bottom:1px solid var(--line);color:var(--txt-dim);vertical-align:middle}
tbody tr{transition:.1s;cursor:pointer}
tbody tr:hover{background:var(--panel2)}
tbody tr.sel{background:rgba(34,211,238,.07)}
.mono{font-family:var(--mono)}
.t-id{font-family:var(--mono);color:var(--cyan);font-size:11px}

/* severity & status pills */
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;font-family:var(--mono);white-space:nowrap}
.pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.sev-Critical{color:var(--crit);background:rgba(255,77,109,.13)}
.sev-High{color:var(--high);background:rgba(255,138,61,.13)}
.sev-Medium{color:var(--med);background:rgba(245,181,68,.13)}
.sev-Low{color:var(--low);background:rgba(61,168,255,.13)}
.st-New{color:#8ea2c4;background:rgba(142,162,196,.12)}
.st-Acknowledged{color:var(--cyan);background:rgba(34,211,238,.12)}
.st-InProgress{color:var(--amber);background:rgba(245,181,68,.12)}
.st-Escalated{color:var(--high);background:rgba(255,138,61,.12)}
.st-Contained{color:var(--green);background:rgba(52,224,161,.12)}
.st-Closed{color:var(--green);background:rgba(52,224,161,.12)}
.st-FalsePositive{color:var(--txt-faint);background:rgba(83,97,132,.15)}

.tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-family:var(--mono);
  background:var(--bg);border:1px solid var(--line2);color:var(--txt-dim);margin:2px}
.tag.mitre{color:var(--cyan);border-color:var(--cyan-dim)}
.tag.ioc{color:var(--amber);border-color:rgba(245,181,68,.3)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:7px;font-size:12.5px;font-weight:600;
  border:1px solid var(--line2);background:var(--panel);color:var(--txt);transition:.13s}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn.primary{background:linear-gradient(90deg,var(--cyan),var(--green));color:#03121a;border:none}
.btn.primary:hover{filter:brightness(1.08);box-shadow:0 6px 18px var(--glow-cyan)}
.btn.danger{border-color:rgba(255,77,109,.4);color:var(--crit)}
.btn.danger:hover{background:rgba(255,77,109,.12)}
.btn.warn{border-color:rgba(255,138,61,.4);color:var(--high)}
.btn.warn:hover{background:rgba(255,138,61,.12)}
.btn.sm{padding:5px 10px;font-size:11.5px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.sel-in,.txt-in{background:var(--bg);border:1px solid var(--line2);color:var(--txt);padding:7px 11px;border-radius:7px;font-size:12.5px;outline:none}
.txt-in:focus,.sel-in:focus{border-color:var(--cyan)}
.txt-in{min-width:220px}

/* live feed */
.feed{height:340px;overflow-y:auto;font-family:var(--mono);font-size:12px}
.feed-row{display:flex;gap:10px;padding:7px 4px;border-bottom:1px solid var(--line);align-items:baseline;animation:slidein .35s ease}
@keyframes slidein{from{opacity:0;transform:translateX(-8px)}to{opacity:1}}
.feed-row .ts{color:var(--txt-faint);flex-shrink:0}
.feed-row .src{color:var(--cyan);flex-shrink:0;min-width:72px}
.feed-row .msg{color:var(--txt-dim);flex:1}
.feed-row .sv{flex-shrink:0}

/* two-col workspace */
.split{display:grid;grid-template-columns:1fr 380px;gap:14px;align-items:start}
.split.wide{grid-template-columns:1fr 440px}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:var(--txt-faint);text-align:center;gap:10px}
.detail-empty .big{font-size:40px;opacity:.3}

/* timeline */
.tl{position:relative;padding-left:24px}
.tl::before{content:'';position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--line2)}
.tl-item{position:relative;padding-bottom:16px}
.tl-item::before{content:'';position:absolute;left:-21px;top:3px;width:11px;height:11px;border-radius:50%;
  background:var(--bg);border:2px solid var(--cyan);box-shadow:0 0 8px var(--glow-cyan)}
.tl-item .tl-time{font-family:var(--mono);font-size:11px;color:var(--cyan)}
.tl-item .tl-txt{font-size:12.5px;color:var(--txt);margin-top:2px}
.tl-item .tl-meta{font-size:11px;color:var(--txt-faint);margin-top:2px}

/* MITRE matrix */
.mitre-grid{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(132px,1fr);gap:6px;overflow-x:auto;padding-bottom:8px}
.mitre-col{min-width:132px}
.mitre-col .tac{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--cyan);
  padding:8px;background:var(--bg2);border:1px solid var(--line2);border-radius:7px 7px 0 0;text-align:center;min-height:46px;display:flex;align-items:center;justify-content:center}
.mitre-tech{font-size:11px;padding:7px 8px;border:1px solid var(--line);border-top:none;background:var(--panel);
  color:var(--txt-dim);transition:.12s;cursor:default}
.mitre-tech:last-child{border-radius:0 0 7px 7px}
.mitre-tech .tid{font-family:var(--mono);font-size:9.5px;color:var(--txt-faint);display:block}
.mitre-tech.hot{background:rgba(255,77,109,.14);color:var(--crit);border-color:rgba(255,77,109,.3)}
.mitre-tech.hot .tid{color:var(--crit)}
.mitre-tech.warm{background:rgba(255,138,61,.1);color:var(--high)}

/* SIEM tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--line)}
.tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--txt-dim);border-bottom:2px solid transparent;transition:.12s}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.siem-bar{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:9px;margin-bottom:14px;font-family:var(--mono);font-size:12px}
.siem-splunk{background:linear-gradient(90deg,rgba(101,163,13,.15),transparent);border:1px solid rgba(101,163,13,.3)}
.siem-qradar{background:linear-gradient(90deg,rgba(15,98,254,.15),transparent);border:1px solid rgba(15,98,254,.3)}
.siem-sentinel{background:linear-gradient(90deg,rgba(0,120,212,.15),transparent);border:1px solid rgba(0,120,212,.3)}
.spl-query{background:#05080f;border:1px solid var(--line2);border-radius:8px;padding:12px;font-family:var(--mono);
  font-size:12.5px;color:var(--green);margin-bottom:14px;white-space:pre-wrap;line-height:1.6}
.spl-query .cmd{color:var(--cyan)}.spl-query .str{color:var(--amber)}.spl-query .fn{color:#c792ea}

/* code editor look */
.code-box{background:#05080f;border:1px solid var(--line2);border-radius:9px;overflow:hidden}
.code-box .cb-head{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--txt-dim)}
.code-box textarea{width:100%;min-height:220px;background:transparent;border:none;color:var(--green);
  font-family:var(--mono);font-size:12.5px;padding:12px;resize:vertical;outline:none;line-height:1.6}
.dotr,.doty,.dotg{width:10px;height:10px;border-radius:50%}
.dotr{background:#ff5f56}.doty{background:#ffbd2e}.dotg{background:#27c93f}

/* progress / lifecycle */
.lifecycle{display:flex;gap:0;overflow-x:auto;padding:6px 0;margin-bottom:8px}
.lc-step{flex:1;min-width:96px;text-align:center;position:relative;padding-top:26px}
.lc-step::before{content:'';position:absolute;top:8px;left:0;right:0;height:2px;background:var(--line2)}
.lc-step:first-child::before{left:50%}.lc-step:last-child::before{right:50%}
.lc-step .node{position:absolute;top:2px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;
  background:var(--bg);border:2px solid var(--line2);z-index:2}
.lc-step.done .node{background:var(--green);border-color:var(--green);box-shadow:0 0 8px var(--green)}
.lc-step.current .node{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse 1.5s infinite}
.lc-step.done::before,.lc-step.current::before{background:var(--green)}
.lc-step .lbl{font-size:10px;color:var(--txt-faint);font-weight:600}
.lc-step.done .lbl,.lc-step.current .lbl{color:var(--txt)}

/* misc */
.kv{display:grid;grid-template-columns:104px 1fr;gap:6px 12px;font-size:12.5px;margin:4px 0}
.kv .k{color:var(--txt-faint);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.kv .v{color:var(--txt);font-family:var(--mono);word-break:break-all}
.section-divider{font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--cyan);
  font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:9px}
.section-divider::after{content:'';flex:1;height:1px;background:var(--line)}
.empty-hint{color:var(--txt-faint);font-size:12px;padding:14px;text-align:center;font-style:italic}
.note-item{background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:9px 11px;margin-bottom:7px;font-size:12px}
.note-item .nh{font-size:10px;color:var(--txt-faint);font-family:var(--mono);margin-bottom:3px}
.timeline{position:relative;padding-left:6px;margin-top:6px}
.tl-row{display:flex;align-items:flex-start;gap:10px;padding:5px 0;position:relative}
.tl-time{color:var(--cyan);font-size:11px;min-width:62px;padding-top:1px}
.tl-dot{width:9px;height:9px;border-radius:50%;background:var(--line2);border:2px solid var(--panel);margin-top:3px;flex:none;box-shadow:0 0 0 1px var(--line2)}
.tl-dot.phase{background:var(--high);box-shadow:0 0 8px var(--high)}
.tl-txt{font-size:12.5px;color:var(--txt);line-height:1.45}
.ev-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ev-item{display:flex;gap:9px;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:8px 10px}

/* toast */
#toasts{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--cyan);border-radius:8px;
  padding:12px 16px;min-width:280px;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,.5);animation:toastin .3s ease;font-size:13px}
.toast.ok{border-left-color:var(--green)}.toast.warn{border-left-color:var(--high)}.toast.crit{border-left-color:var(--crit)}
.toast b{display:block;margin-bottom:2px;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
@keyframes toastin{from{opacity:0;transform:translateX(30px)}to{opacity:1}}

/* modal */
#modal{position:fixed;inset:0;z-index:250;background:rgba(3,6,12,.78);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line2);border-radius:14px;
  width:760px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:2}
.modal-head h2{font-family:var(--disp);font-size:19px;color:#fff}
.modal-body{padding:22px}
.x-btn{background:none;border:none;color:var(--txt-dim);font-size:22px;line-height:1}
.x-btn:hover{color:var(--crit)}

.atk-card{border:1px solid var(--line2);border-radius:11px;padding:16px;transition:.15s;background:var(--panel)}
.atk-card:hover{border-color:var(--high);box-shadow:0 10px 30px rgba(0,0,0,.35);transform:translateY(-2px)}
.atk-card .atk-ic{font-size:26px;margin-bottom:8px}
.atk-card h4{font-size:14px;color:#fff;margin-bottom:4px}

.hidden{display:none!important}

small.help{display:block;color:var(--txt-faint);font-size:11px;margin-top:4px}
.chart-h{position:relative;height:230px}
.chart-h.sm{height:180px}

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">SOC<span>Verse</span></div>
    <div class="login-sub">// SECURITY OPERATIONS CENTER · INCIDENT LIFECYCLE SIMULATOR</div>
    <div class="fld">
      <label>Analyst Name</label>
      <input id="loginName" placeholder="e.g. A. Mercer" value="Analyst">
    </div>
    <div class="fld">
      <label>Select Role · Access Tier</label>
      <div class="role-grid" id="roleGrid">
        <div class="role-opt sel" data-role="L1"><b>L1</b><small>Triage · Monitoring</small></div>
        <div class="role-opt" data-role="L2"><b>L2</b><small>Investigation</small></div>
        <div class="role-opt" data-role="L3"><b>L3</b><small>Hunt · Response</small></div>
        <div class="role-opt" data-role="Manager"><b>Manager</b><small>Oversight · Metrics</small></div>
      </div>
    </div>
    <button class="btn-login" onclick="doLogin()">ENTER SOC ▸</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span>SOC<span>Verse</span></div>
    <div class="top-stats" id="topStats"></div>
    <div class="top-right">
      <div class="clock" id="clock">--:--:--</div>
      <button class="btn sm" id="engineBtn" onclick="toggleEngine()">⏸ Pause Feed</button>
      <div class="user-chip">
        <div class="ava" id="userAva">A</div>
        <div class="meta"><b id="userName">Analyst</b><small id="userRole">L1</small></div>
      </div>
      <button class="logout" onclick="logout()">Exit</button>
    </div>
  </div>

  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<div id="toasts"></div>
<div id="modal"><div class="modal-card"><div class="modal-head"><h2 id="modalTitle"></h2><button class="x-btn" onclick="closeModal()">×</button></div><div class="modal-body" id="modalBody"></div></div></div>

<script>
/* ============================================================
   SOCVerse — single-file SOC simulation engine
   ============================================================ */

/* ---------- reference data ---------- */
const SOURCES = ['Firewall','IDS/IPS','EDR','Win Event Log','Linux Log','DNS Log','Proxy Log','Cloud Log'];
const SEVS = ['Critical','High','Medium','Low'];
const CATEGORIES = ['Malware','Brute Force','Phishing','Privilege Escalation','Data Exfiltration',
  'C2 Traffic','Insider Threat','Reconnaissance','Policy Violation','Suspicious Login','Lateral Movement','Ransomware'];

const MITRE = [
  {tac:'Reconnaissance',techs:[['T1595','Active Scanning'],['T1592','Victim Host Info'],['T1589','Gather Identity Info']]},
  {tac:'Initial Access',techs:[['T1566','Phishing'],['T1190','Exploit Public App'],['T1078','Valid Accounts'],['T1133','External Remote Svc']]},
  {tac:'Execution',techs:[['T1059','Command/Script Interp'],['T1204','User Execution'],['T1053','Scheduled Task']]},
  {tac:'Persistence',techs:[['T1547','Boot/Logon Autostart'],['T1136','Create Account'],['T1505','Server Software']]},
  {tac:'Priv. Escalation',techs:[['T1068','Exploit Priv Esc'],['T1055','Process Injection'],['T1134','Token Manipulation']]},
  {tac:'Defense Evasion',techs:[['T1070','Indicator Removal'],['T1027','Obfuscated Files'],['T1562','Impair Defenses']]},
  {tac:'Credential Access',techs:[['T1110','Brute Force'],['T1003','OS Cred Dumping'],['T1555','Creds from Stores']]},
  {tac:'Discovery',techs:[['T1087','Account Discovery'],['T1018','Remote Sys Discovery'],['T1046','Network Svc Scan']]},
  {tac:'Lateral Movement',techs:[['T1021','Remote Services'],['T1570','Lateral Tool Transfer'],['T1080','Taint Shared Content']]},
  {tac:'Collection',techs:[['T1005','Data Local System'],['T1114','Email Collection'],['T1056','Input Capture']]},
  {tac:'Command & Control',techs:[['T1071','App Layer Protocol'],['T1572','Protocol Tunneling'],['T1105','Ingress Tool Transfer']]},
  {tac:'Exfiltration',techs:[['T1041','Exfil over C2'],['T1048','Exfil Alt Protocol'],['T1567','Exfil Web Service']]},
  {tac:'Impact',techs:[['T1486','Data Encrypted (Ransom)'],['T1490','Inhibit Recovery'],['T1499','Endpoint DoS']]},
];

// attack scenario templates -> generate correlated alert chains
const SCENARIOS = {
  brute:{name:'Brute Force Attack',icon:'🔓',cat:'Brute Force',sev:'High',
    mitre:['T1110','T1078'],desc:'Repeated failed auth from a single source against multiple accounts.',
    steps:['Firewall','IDS/IPS','Win Event Log','EDR']},
  phish:{name:'Phishing Attack',icon:'🎣',cat:'Phishing',sev:'High',
    mitre:['T1566','T1204','T1059'],desc:'Malicious email delivered; user clicks weaponized link/attachment.',
    steps:['Proxy Log','DNS Log','EDR','Win Event Log']},
  malware:{name:'Malware Infection',icon:'🦠',cat:'Malware',sev:'Critical',
    mitre:['T1204','T1059','T1055','T1071'],desc:'Endpoint executes malicious payload, beacons out.',
    steps:['EDR','Proxy Log','DNS Log','IDS/IPS']},
  ransom:{name:'Ransomware Attack',icon:'🔒',cat:'Ransomware',sev:'Critical',
    mitre:['T1486','T1490','T1059','T1021'],desc:'Mass file encryption and shadow-copy deletion across hosts.',
    steps:['EDR','Win Event Log','Firewall','Cloud Log']},
  privesc:{name:'Privilege Escalation',icon:'⬆️',cat:'Privilege Escalation',sev:'High',
    mitre:['T1068','T1134','T1055'],desc:'Local account gains SYSTEM/root through exploit or token abuse.',
    steps:['Win Event Log','Linux Log','EDR']},
  exfil:{name:'Data Exfiltration',icon:'📤',cat:'Data Exfiltration',sev:'Critical',
    mitre:['T1041','T1048','T1567'],desc:'Large outbound transfer to untrusted destination.',
    steps:['Proxy Log','Firewall','Cloud Log','DNS Log']},
  insider:{name:'Insider Threat',icon:'🕵️',cat:'Insider Threat',sev:'Medium',
    mitre:['T1078','T1005','T1114'],desc:'Authorized user accesses/copies data outside normal scope.',
    steps:['Cloud Log','Win Event Log','Proxy Log']},
  c2:{name:'Command & Control Traffic',icon:'📡',cat:'C2 Traffic',sev:'High',
    mitre:['T1071','T1572','T1105'],desc:'Beaconing to known C2 infrastructure on regular intervals.',
    steps:['DNS Log','Proxy Log','Firewall','IDS/IPS']},
};

/* random pools */
const FIRST=['Alex','Jordan','Priya','Wei','Sam','Mara','Leo','Nadia','Omar','Tess','Ravi','Yuki','Diego','Hana','Cole'];
const LAST=['Chen','Patel','Nguyen','Okafor','Silva','Kim','Rossi','Haddad','Larsson','Ortiz','Singh','Ivanov'];
const HOSTS=['WIN-HR-014','WIN-FIN-022','SRV-DC01','SRV-WEB02','LX-APP-07','WIN-CEO-LT','SRV-SQL01','WIN-DEV-31','LX-DB-03','WIN-OPS-09'];
const USERS=['j.smith','m.lopez','svc_backup','admin','a.kumar','root','k.brown','d.wright','svc_sql','guest','t.evans'];
const BAD_DOMAINS=['secure-update-login.com','cdn-tracker-x.ru','invoice-docs-share.net','mail-verify-account.co','update-flash-player.info','telemetry-sync.xyz','paypaI-secure.com','dropbx-files.net'];
const BAD_URLS=['/wp-content/upload/x.php','/api/v2/exfil','/get?id=AES256','/payload/stage2.dll','/login/verify.html','/cdn/jquery.min.js?c2'];
function randHash(){const h='0123456789abcdef';let s='';for(let i=0;i<64;i++)s+=h[Math.floor(Math.random()*16)];return s;}
function intIP(){return `${rnd(1,223)}.${rnd(0,255)}.${rnd(0,255)}.${rnd(1,254)}`;}
function privIP(){return `10.${rnd(0,40)}.${rnd(0,255)}.${rnd(1,254)}`;}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function pad(n){return String(n).padStart(2,'0');}
function analystName(){return pick(FIRST)+' '+pick(LAST);}

/* alert message templates per source */
function alertContent(source,cat){
  const ip=intIP(),host=pick(HOSTS),user=pick(USERS),dom=pick(BAD_DOMAINS),hash=randHash(),url=pick(BAD_URLS);
  const M={
   'Firewall':[`Blocked inbound ${rnd(40,9000)} connections from ${ip} to ${host}`,`Outbound to ${ip}:${pick([4444,8080,53,443])} matched threat feed`,`Port scan detected from ${ip} across ${rnd(20,800)} ports`],
   'IDS/IPS':[`Signature ET-${rnd(2000000,2099999)} triggered: ${cat} from ${ip}`,`Exploit attempt CVE-2024-${rnd(1000,9999)} against ${host}`,`Suricata alert: anomalous payload to ${host}`],
   'EDR':[`Process ${pick(['powershell.exe','rundll32.exe','wscript.exe','mshta.exe','cmd.exe'])} spawned by ${pick(['winword.exe','outlook.exe','chrome.exe'])} on ${host}`,`Malicious binary quarantined on ${host} (sha256 ${hash.slice(0,12)}…)`,`Suspicious script execution by ${user} on ${host}`],
   'Win Event Log':[`Event 4625: ${rnd(8,240)} failed logons for ${user} on ${host}`,`Event 4672: special privileges assigned to ${user}`,`Event 4688: new process created by ${user} on ${host}`,`Event 1102: audit log cleared on ${host}`],
   'Linux Log':[`auth.log: ${rnd(10,300)} failed SSH for ${user} from ${ip}`,`sudo: ${user} ran command as root on ${host}`,`cron: unexpected job added by ${user} on ${host}`],
   'DNS Log':[`High-entropy DNS query to ${dom} from ${host}`,`NXDOMAIN flood / DGA pattern from ${host}`,`Resolution to known-bad ${dom}`],
   'Proxy Log':[`User ${user} requested ${dom}${url}`,`Large upload ${rnd(50,4096)}MB to ${dom} by ${user}`,`Access to newly-registered domain ${dom}`],
   'Cloud Log':[`Impossible travel for ${user}: login from 2 geos in ${rnd(4,40)}m`,`S3 bucket made public by ${user}`,`MFA disabled for ${user} via console`,`${rnd(50,5000)} objects downloaded by ${user}`],
  };
  return {msg:pick(M[source]||['Anomalous activity detected']),ip,host,user,dom,hash,url};
}

/* ---------- state ---------- */
const state={
  user:null, alerts:[], tickets:[], cases:[], hunts:[], detections:[],
  seq:1, ticketSeq:1, caseSeq:1, engineOn:true,
  selAlert:null, selCase:null, view:'overview',
  history:{labels:[],counts:[]}, // alerts/min for chart
  metrics:{detected:0,resolved:0,fp:0,escalated:0,contained:0, mttdSum:0,mttdN:0,mttrSum:0,mttrN:0},
  analysts:[], log:[],
};
const LIFECYCLE=['Alert','L1 Triage','Ticket','L2 Investigation','Threat Validation','L3 Hunting','Containment','Eradication','Recovery','Lessons Learned'];

/* seed a few analysts for performance tracking */
function seedAnalysts(){
  ['L1','L1','L2','L2','L3'].forEach(r=>state.analysts.push({name:analystName(),role:r,handled:rnd(8,40),avgMin:rnd(4,28),closed:rnd(5,30)}));
}

/* ---------- alert factory ---------- */
function makeAlert(opts={}){
  const source=opts.source||pick(SOURCES);
  const cat=opts.cat||pick(CATEGORIES);
  const sev=opts.sev||pick(SEVS.concat(['High','Medium','Medium','Low'])); // weight mid
  const c=alertContent(source,cat);
  const mitre=opts.mitre||pick(MITRE).techs.slice(0,rnd(1,2)).map(t=>t[0]);
  const now=new Date();
  const a={
    id:'ALR-'+String(state.seq++).padStart(5,'0'),
    ts:now.toISOString(), tsNum:now.getTime(),
    source, cat, sev,
    title:c.msg,
    srcIp:c.ip, destIp:privIP(), host:c.host, user:c.user, domain:c.dom, url:c.url, hash:c.hash,
    status:'New', assignee:null, scenario:opts.scenario||null,
    mitre, stage:0,
    iocs:{ip:[c.ip],domain:[c.dom],url:[c.url],hash:[c.hash]},
    raw:`${now.toISOString()} src=${c.ip} dst=${privIP()} host=${c.host} user=${c.user} sev=${sev} msg="${c.msg}"`,
    timeline:[{t:now,txt:`Alert generated by ${source}`,who:'SIEM Engine'}],
    evidence:[], notes:[], enriched:false, fp:false,
    detectMin: (Math.random()*9+1), // simulated MTTD minutes
  };
  state.metrics.detected++;
  state.metrics.mttdSum+=a.detectMin; state.metrics.mttdN++;
  state.alerts.unshift(a);
  if(state.alerts.length>600) state.alerts.length=600;
  pushFeed(a);
  if(a.sev==='Critical') toast('crit','CRITICAL ALERT',`${a.id} · ${a.title.slice(0,60)}`);
  return a;
}

/* live feed buffer */
const feedBuf=[];
function pushFeed(a){
  const d=new Date(a.tsNum);
  feedBuf.unshift({ts:`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`,src:a.source,msg:a.title,sev:a.sev});
  if(feedBuf.length>120)feedBuf.length=120;
  if(state.view==='overview'||state.view==='warroom')renderFeedInto();
}

/* kill-chain narrative per scenario — drives the Investigation Timeline */
const KILLCHAIN={
  brute:['Repeated failed logins detected','Account lockout threshold reached','Successful login after brute force','Suspicious session established','Privilege enumeration'],
  phish:['Phishing email delivered','User clicked malicious link','Credential harvest page loaded','Payload downloaded','Endpoint executed macro'],
  malware:['Initial payload execution','Process injection observed','DNS beacon to C2','C2 communication established','Secondary payload staged'],
  ransom:['Initial access via RDP','Defense evasion — AV disabled','Shadow copies deleted','Mass file encryption started','Ransom note dropped'],
  privesc:['Local account compromised','Exploit executed','Token manipulation','SYSTEM/root obtained','Persistence installed'],
  exfil:['Sensitive data staged','Archive created','Large outbound transfer','Upload to untrusted host','Exfiltration over web service'],
  insider:['Off-hours access','Bulk file access','Data copied to removable media','Cloud share created','External share granted'],
  c2:['DNS query to C2 domain','Beacon callback','Encrypted channel established','Command received','Additional tooling pulled'],
};
/* run a full attack scenario = chain of correlated alerts into a case, with a reconstructed kill-chain timeline */
function runScenario(key){
  const sc=SCENARIOS[key];
  const sharedIp=intIP(), sharedHost=pick(HOSTS), sharedUser=pick(USERS), sharedDom=pick(BAD_DOMAINS);
  const chain=[];
  const kc=KILLCHAIN[key]||[];
  const base=Date.now()-(sc.steps.length+1)*2*60000; // stagger timeline ~2 min apart
  sc.steps.forEach((src,i)=>{
    const a=makeAlert({source:src,cat:sc.cat,sev:i===sc.steps.length-1?sc.sev:pick(['Medium','High']),mitre:sc.mitre,scenario:sc.name});
    a.srcIp=sharedIp; a.host=sharedHost; a.user=sharedUser; a.domain=sharedDom;
    a.iocs.ip=[sharedIp]; a.iocs.domain=[sharedDom];
    a.title=`[${sc.name}] ${a.title}`;
    // build a kill-chain timeline shared across the correlated alerts
    a.timeline=kc.map((txt,j)=>({t:new Date(base+j*2*60000),txt,who:src,phase:true}));
    a.timeline.push({t:new Date(),txt:`Alert generated by ${src}`,who:'SIEM Engine'});
    chain.push(a);
  });
  toast('crit','ATTACK SIMULATION LAUNCHED',`${sc.name} — ${chain.length} correlated alerts injected`);
  log(`Scenario "${sc.name}" launched (${chain.length} alerts, shared host ${sharedHost})`);
  return chain;
}

function log(txt){state.log.unshift({t:new Date(),txt});if(state.log.length>200)state.log.length=200;}

/* ============================================================
   NAVIGATION + RBAC
   ============================================================ */
const NAV=[
  {grp:'Command',items:[
    {id:'overview',ic:'◈',label:'SOC Overview',roles:['L1','L2','L3','Manager']},
    {id:'warroom',ic:'⌖',label:'War Room',roles:['L1','L2','L3','Manager']},
  ]},
  {grp:'Tier 1 · Triage',items:[
    {id:'triage',ic:'▤',label:'Alert Queue',roles:['L1','L2','L3','Manager'],badge:'newAlerts'},
    {id:'tickets',ic:'▦',label:'Tickets',roles:['L1','L2','L3','Manager']},
  ]},
  {grp:'Tier 2 · Investigation',items:[
    {id:'invest',ic:'◎',label:'Investigation',roles:['L2','L3','Manager']},
    {id:'cases',ic:'🗂️',label:'Case Management',roles:['L2','L3','Manager']},
    {id:'mitre',ic:'⊞',label:'MITRE ATT&CK',roles:['L1','L2','L3','Manager']},
    {id:'intel',ic:'◍',label:'Threat Intel',roles:['L2','L3','Manager']},
  ]},
  {grp:'Tier 3 · Hunt & Respond',items:[
    {id:'hunt',ic:'⌕',label:'Threat Hunting',roles:['L3','Manager']},
    {id:'detect',ic:'⊟',label:'Detection Rules',roles:['L3','Manager']},
    {id:'respond',ic:'⛒',label:'Containment',roles:['L3','Manager']},
  ]},
  {grp:'Platform',items:[
    {id:'siem',ic:'▥',label:'SIEM Consoles',roles:['L1','L2','L3','Manager']},
    {id:'attacks',ic:'⚡',label:'Attack Simulator',roles:['L1','L2','L3','Manager']},
    {id:'metrics',ic:'◷',label:'Metrics & SLA',roles:['Manager','L3']},
    {id:'reports',ic:'▣',label:'Reports',roles:['L1','L2','L3','Manager']},
  ]},
];
function canSee(item){return item.roles.includes(state.user.role);}

function renderNav(){
  const nav=document.getElementById('sidebar');
  let h='';
  NAV.forEach(g=>{
    const items=g.items.filter(canSee);
    if(!items.length)return;
    h+=`<div class="nav-group"><h6>${g.grp}</h6>`;
    items.forEach(it=>{
      let badge='';
      if(it.badge==='newAlerts'){const n=state.alerts.filter(a=>a.status==='New').length;if(n)badge=`<span class="badge">${n>99?'99+':n}</span>`;}
      h+=`<div class="nav-item ${state.view===it.id?'active':''}" onclick="go('${it.id}')"><span class="ic">${it.ic}</span>${it.label}${badge}</div>`;
    });
    h+='</div>';
  });
  h+=`<div class="nav-foot">SOCVerse v1.0 · sim mode<br>role: ${state.user.role} · ${state.alerts.length} alerts in memory</div>`;
  nav.innerHTML=h;
}

function go(view){
  // guard RBAC
  const all=NAV.flatMap(g=>g.items);
  const item=all.find(i=>i.id===view);
  if(item && !canSee(item)){toast('warn','ACCESS DENIED',`Role ${state.user.role} cannot access ${item.label}`);return;}
  state.view=view; renderNav(); renderView();
  document.getElementById('main').scrollTop=0;
}

/* ============================================================
   TOP BAR / SHELL
   ============================================================ */
function renderTop(){
  const open=state.alerts.filter(a=>['New','Acknowledged','InProgress'].includes(a.status)).length;
  const crit=state.alerts.filter(a=>a.sev==='Critical'&&a.status!=='Closed'&&a.status!=='FalsePositive').length;
  const esc=state.alerts.filter(a=>a.status==='Escalated').length;
  document.getElementById('topStats').innerHTML=`
    <div class="tstat"><span class="lbl">Open</span><b style="color:var(--cyan)">${open}</b></div>
    <div class="tstat"><span class="lbl">Critical</span><b style="color:var(--crit)">${crit}</b></div>
    <div class="tstat"><span class="lbl">Escalated</span><b style="color:var(--high)">${esc}</b></div>
    <div class="tstat"><span class="lbl">Cases</span><b style="color:var(--green)">${state.cases.length}</b></div>`;
}

/* ============================================================
   HELPERS — toast, modal, pills
   ============================================================ */
function toast(type,title,msg){
  const el=document.createElement('div');
  el.className='toast '+(type||'');
  el.innerHTML=`<b>${title}</b>${msg||''}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='.4s';setTimeout(()=>el.remove(),400)},4200);
}
function openModal(title,body){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}
function sevPill(s){return `<span class="pill sev-${s}">${s}</span>`;}
function stPill(s){return `<span class="pill st-${s}">${s.replace(/([A-Z])/g,' $1').trim()}</span>`;}
function fmtTime(d){d=new Date(d);return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}
function fmtDate(d){d=new Date(d);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${fmtTime(d)}`;}
function ago(d){const s=Math.floor((Date.now()-new Date(d).getTime())/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';return Math.floor(s/3600)+'h';}

/* ============================================================
   ENGINE + CLOCK
   ============================================================ */
let engineTimer=null, clockTimer=null;
function engineTick(){
  if(!state.engineOn)return;
  // generate 1-3 alerts every few seconds
  const n=rnd(1,2);
  for(let i=0;i<n;i++) if(Math.random()<0.8) makeAlert();
  // history for chart (per tick)
  const t=new Date();
  state.history.labels.push(`${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`);
  state.history.counts.push(n);
  if(state.history.labels.length>30){state.history.labels.shift();state.history.counts.shift();}
  renderTop(); renderNav();
  if(['overview','triage','metrics','warroom','siem'].includes(state.view)) softRefresh();
}
function toggleEngine(){
  state.engineOn=!state.engineOn;
  document.getElementById('engineBtn').textContent=state.engineOn?'⏸ Pause Feed':'▶ Resume Feed';
  toast(state.engineOn?'ok':'warn',state.engineOn?'FEED RESUMED':'FEED PAUSED','Alert generation '+(state.engineOn?'active':'halted'));
}
function startClock(){
  clockTimer=setInterval(()=>{const d=new Date();document.getElementById('clock').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())} UTC`;},1000);
}

/* soft refresh: only re-render charts/feed for current view without rebuilding inputs */
function softRefresh(){
  if(state.view==='overview') updateOverviewCharts();
  if(state.view==='triage') refreshTriageTable();

function severityCounts(){const c={Critical:0,High:0,Medium:0,Low:0};state.alerts.forEach(a=>c[a.sev]++);return c;}
function sourceCounts(){const c={};SOURCES.forEach(s=>c[s]=0);state.alerts.forEach(a=>c[a.source]++);return c;}
function statusCounts(){const c={};state.alerts.forEach(a=>c[a.status]=(c[a.status]||0)+1);return c;}

function buildOverviewCharts(){
  const sv=severityCounts();
  charts.vol=new Chart(document.getElementById('cVol'),{type:'line',
    data:{labels:[...state.history.labels],datasets:[{data:[...state.history.counts],borderColor:'#22d3ee',

    options:lineOpts()});
  charts.sev=new Chart(document.getElementById('cSev'),{type:'doughnut',
    data:{labels:Object.keys(sv),datasets:[{data:Object.values(sv),
      backgroundColor:['#ff4d6d','#ff8a3d','#f5b544','#3da8ff'],borderColor:'#0b1120',borderWidth:3}]},
    options:doughOpts()});
  const sc=sourceCounts();
  charts.src=new Chart(document.getElementById('cSrc'),{type:'bar',
    data:{labels:Object.keys(sc),datasets:[{data:Object.values(sc),backgroundColor:'#34e0a1',borderRadius:4}]},
    options:barOpts()});

  charts.stat=new Chart(document.getElementById('cStat'),{type:'bar',
    data:{labels:Object.keys(st),datasets:[{data:Object.values(st),backgroundColor:'#22d3ee',borderRadius:4}]},

function updateOverviewCharts(){
  if(charts.vol){charts.vol.data.labels=[...state.history.labels];charts.vol.data.datasets[0].data=[...state.history.counts];charts.vol.update('none');}
  if(charts.sev){const s=severityCounts();charts.sev.data.datasets[0].data=Object.values(s);charts.sev.update('none');}
  if(charts.src){const s=sourceCounts();charts.src.data.datasets[0].data=Object.values(s);charts.src.update('none');}
  if(charts.stat){const s=statusCounts();charts.stat.data.labels=Object.keys(s);charts.stat.data.datasets[0].data=Object.values(s);charts.stat.update('none');}
  renderFeedInto();
}
function renderFeedInto(){

/* chart option presets */
const GRID='rgba(39,57,90,.5)', TICK='#7f93b3';
function lineOpts(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
  scales:{x:{grid:{color:GRID},ticks:{color:TICK,maxTicksLimit:8,font:{size:9}}},y:{grid:{color:GRID},ticks:{color:TICK,font:{size:10}},beginAtZero:true}}};}
function barOpts(horiz){return{indexAxis:horiz?'y':'x',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
  scales:{x:{grid:{color:GRID},ticks:{color:TICK,font:{size:9}}},y:{grid:{color:GRID},ticks:{color:TICK,font:{size:10}}}}};}
function doughOpts(){return{responsive:true,maintainAspectRatio:false,cutout:'62%',
  plugins:{legend:{position:'right',labels:{color:'#cfe0f5',font:{size:11},boxWidth:12,padding:10}}}};}

function filteredAlerts(){
  return state.alerts.filter(a=>{
    if(triageFilter.sev&&a.sev!==triageFilter.sev)return false;
    if(triageFilter.status&&a.status!==triageFilter.status)return false;
    if(triageFilter.source&&a.source!==triageFilter.source)return false;
    if(triageFilter.q){const blob=(a.id+a.host+a.user+a.srcIp+a.cat+a.title+a.domain).toLowerCase();if(!blob.includes(triageFilter.q))return false;}
    return true;
  });
}
function refreshTriageTable(){
  const tb=document.getElementById('triageBody');if(!tb)return;
  const list=filteredAlerts().slice(0,150);
  tb.innerHTML=list.map(a=>`<tr class="${state.selAlert===a.id?'sel':''}" onclick="openAlert('${a.id}')">
    <td class="t-id">${a.id}</td><td class="mono" style="font-size:11px">${fmtTime(a.ts)}</td><td>${sevPill(a.sev)}</td>
    <td class="mono" style="font-size:11px">${a.source}</td><td>${a.cat}</td>
    <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.title}</td><td>${stPill(a.status)}</td></tr>`).join('')
    ||'<tr><td colspan="7" class="empty-hint">No alerts match filters</td></tr>';
}
function bulkAck(){
  let n=0;filteredAlerts().forEach(a=>{if(a.status==='New'){a.status='Acknowledged';a.assignee=state.user.name;a.timeline.push({t:new Date(),txt:'Acknowledged (bulk)',who:state.user.name});n++;}});

function renderIOCs(a){
  const rows=[];
  if(a.iocs.ip.length)rows.push(['IP',a.iocs.ip.join(', ')]);
  if(a.iocs.domain.length)rows.push(['Domain',a.iocs.domain.join(', ')]);
  if(a.iocs.url.length)rows.push(['URL',a.iocs.url.join(', ')]);
  if(a.iocs.hash.length)rows.push(['SHA256',a.iocs.hash.map(h=>h.slice(0,24)+'…').join(', ')]);
  return rows.map(r=>`<div style="margin-bottom:4px"><span class="tag ioc">${r[0]}</span> <span class="mono" style="font-size:11.5px;color:var(--txt-dim)">${r[1]}</span></div>`).join('');

  const a=state.alerts.find(x=>x.id===id);
  a.timeline.push({t:new Date(),txt:'IOCs extracted from event payload',who:state.user.name});
  document.getElementById('iocBox').innerHTML=renderIOCs(a);

  openAlert(id);
}

  a.timeline.push({t:new Date(),txt:'Alert acknowledged — entering triage',who:state.user.name});

function relatedAlerts(a){
  return state.alerts.filter(x=>x.id!==a.id && (x.srcIp===a.srcIp||x.host===a.host||x.user===a.user||(a.domain&&x.domain===a.domain)));
}
// deterministic pseudo-intel from an indicator string
function intelFor(ind){
  let h=0;for(const c of ind)h=(h*31+c.charCodeAt(0))>>>0;
  const score=h%100;
  const fams=['Emotet','Cobalt Strike','QakBot','AgentTesla','LockBit','RedLine','Mirai','BlackBasta'];
  const countriesFull=['Russia','China','North Korea','Iran','Brazil','Nigeria','United States','Netherlands'];
  const countries=['RU','CN','KP','IR','BR','NG','US','NL'];
  const verdict=score>72?'Malicious':score>45?'Suspicious':'Unknown';
  const ci=h%countries.length;
  // deterministic per-provider readings derived from the same hash
  const vtDetections=score>72?rnd(38,67):score>45?rnd(8,25):rnd(0,4);
  const confidence=Math.min(99, score>72?rnd(82,98):score>45?rnd(48,74):rnd(3,30));
  const abuseReports=score>72?rnd(120,940):score>45?rnd(15,90):rnd(0,8);
  const otxPulses=score>72?rnd(6,22):score>45?rnd(1,7):0;
  return {score, verdict, family:fams[h%fams.length], country:countries[ci], countryFull:countriesFull[ci],
    firstSeen:`${rnd(1,28)}d ago`, sources:rnd(2,14), confidence,
    providers:{
      virustotal:{name:'VirusTotal', detections:vtDetections, total:72, verdict:vtDetections>30?'Malicious':vtDetections>6?'Suspicious':'Clean'},
      abuseipdb:{name:'AbuseIPDB', confidence, reports:abuseReports, verdict:confidence>80?'Malicious':confidence>45?'Suspicious':'Clean'},
      otx:{name:'AlienVault OTX', pulses:otxPulses, verdict:otxPulses>5?'Malicious':otxPulses>0?'Suspicious':'Clean'},
    }};
}

      </div>

function parseHunt(q){
  // split on AND/OR (simple: treat all as AND unless OR present), each token field=value
  const isOr=/\bOR\b/i.test(q);
  const toks=q.split(/\bAND\b|\bOR\b/i).map(s=>s.trim()).filter(Boolean);
  const preds=toks.map(t=>{const m=t.match(/(\w+)\s*=\s*"?([^"]+)"?/);if(!m)return null;return {f:m[1].toLowerCase(),v:m[2].trim().toLowerCase()};}).filter(Boolean);
  return {isOr,preds};
}
function runHunt(){
  const q=document.getElementById('huntQ').value;
  const {isOr,preds}=parseHunt(q);
  const map={sev:'sev',source:'source',cat:'cat',user:'user',host:'host',ip:'srcIp'};
  const res=state.alerts.filter(a=>{
    const tests=preds.map(p=>{const f=map[p.f];if(!f)return true;return String(a[f]).toLowerCase().includes(p.v);});
    if(!tests.length)return true;
    return isOr?tests.some(Boolean):tests.every(Boolean);
  });
  document.getElementById('huntCount').textContent=res.length+' hits';
  document.getElementById('huntMeta').innerHTML=`query: <span class="mono" style="color:var(--green)">${q}</span> · scanned ${state.alerts.length} events · <a style="color:var(--cyan);cursor:pointer" onclick="saveHunt('${q.replace(/'/g,"")}',${res.length})">save as hypothesis</a>`;
  document.getElementById('huntBody').innerHTML=res.slice(0,80).map(a=>`<tr onclick="go('invest');setTimeout(()=>openInvest('${a.id}'),50)"><td class="t-id">${a.id}</td><td class="mono" style="font-size:11px">${fmtTime(a.ts)}</td><td>${sevPill(a.sev)}</td><td class="mono" style="font-size:11px">${a.source}</td><td>${a.cat}</td><td class="mono">${a.host}</td><td class="mono">${a.user}</td><td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.title}</td></tr>`).join('')||'<tr><td colspan="8" class="empty-hint">No matches</td></tr>';
}
function saveHunt(q,n){
  const note=prompt('Hunt hypothesis note:','Investigating possible '+pick(['lateral movement','C2 beaconing','credential abuse','data staging']));
  if(note===null)return;
  state.hunts.unshift({t:new Date(),q,matches:n,note});
  toast('ok','HUNT SAVED','Hypothesis added to active hunts');viewHunt();
}

state.respActions={iso:0,ip:0,usr:0};state.respLog=[];
function contain(id,type){
  const a=state.alerts.find(x=>x.id===id);
  let msg='';
  if(type==='iso'){state.respActions.iso++;msg=`🖥 Host ${a.host} ISOLATED from network (EDR quarantine)`;}
  if(type==='ip'){state.respActions.ip++;msg=`🚫 IP ${a.srcIp} BLOCKED at firewall/perimeter`;}
  if(type==='usr'){state.respActions.usr++;msg=`👤 Account ${a.user} DISABLED in directory`;}
  state.metrics.contained++;
  a.status='Contained';a.stage=Math.max(a.stage,6);
  // record MTTR (simulate)
  const mttr=a.detectMin+Math.random()*30+5;state.metrics.mttrSum+=mttr;state.metrics.mttrN++;state.metrics.resolved++;
  a.timeline.push({t:new Date(),txt:msg,who:state.user.name});
  state.respLog.unshift({t:new Date(),txt:`[${id}] ${msg}`});
  // update linked case
  const c=state.cases.find(x=>x.anchor===id);if(c){c.status='Contained';c.stage=6;}
  toast('crit','CONTAINMENT EXECUTED',msg);log(msg);
  renderTop();renderNav();viewRespond();
}

    detect:[dtct*0.6,dtct*0.9,dtct*1.3,dtct*1.8].map(x=>+x.toFixed(1)),

function updateMetricCharts(){

const REPORTS=[
  {id:'daily',icon:'📅',name:'Daily SOC Report',desc:'Shift summary of alert volume, severity mix, and outstanding queue.'},
  {id:'incident',icon:'🚨',name:'Incident Report',desc:'Detailed write-up of a contained/closed incident with IOCs and ATT&CK.'},
  {id:'exec',icon:'📈',name:'Executive Summary',desc:'High-level risk posture and KPIs for leadership.'},
  {id:'intel',icon:'🌐',name:'Threat Intelligence Report',desc:'Aggregated malicious indicators enriched with threat intel.'},
  {id:'invest',icon:'🔬',name:'Investigation Report',desc:'L2/L3 case findings, timeline, and recommended actions.'}];
function viewReports(){
  document.getElementById('main').innerHTML=`
    <div class="view-head"><div><div class="crumb">Platform · Reporting</div><h1>📄 Reports</h1>
      <div class="sub">Generate professional SOC reports from live session data</div></div></div>
    <div class="grid" style="grid-template-columns:repeat(3,1fr);gap:14px">
      ${REPORTS.map(r=>`<div class="atk-card" style="border-color:var(--line2)">
        <div class="atk-ic">${r.icon}</div><h4>${r.name}</h4><p>${r.desc}</p>
        <button class="btn primary" style="width:100%" onclick="genReport('${r.id}')">▸ Generate</button></div>`).join('')}
    </div>`;
}
function rptHead(title,sub){return `<div class="section-divider">${sub}</div><div class="note-item" style="background:var(--bg)">${title}</div>`;}
function genReport(id,anchorId){
  const m=state.metrics, now=new Date();
  const mttd=m.mttdN?(m.mttdSum/m.mttdN).toFixed(1):'—', mttr=m.mttrN?(m.mttrSum/m.mttrN).toFixed(1):'—';
  const sv=severityCounts(), total=state.alerts.length;
  let title='', body='';
  if(id==='daily'){
    title='Daily SOC Report';
    body=`<div class="kv mb"><div class="k">Report Date</div><div class="v">${fmtDate(now)}</div>
      <div class="k">Shift Lead</div><div class="v">${state.user.name} (${state.user.role})</div>
      <div class="k">Alerts Ingested</div><div class="v">${total}</div>
      <div class="k">Open Queue</div><div class="v">${state.alerts.filter(a=>['New','Acknowledged','InProgress'].includes(a.status)).length}</div></div>
      <div class="section-divider">Severity Breakdown</div>
      <div class="note-item">Critical: ${sv.Critical} · High: ${sv.High} · Medium: ${sv.Medium} · Low: ${sv.Low}</div>
      <div class="section-divider">Operational Metrics</div>
      <div class="note-item">MTTD ${mttd}m · MTTR ${mttr}m · False Positives ${m.fp} · Escalated ${m.escalated} · Contained ${m.contained}</div>
      <div class="section-divider">Outstanding Items</div>
      <div class="note-item">${state.cases.filter(c=>c.status!=='Closed').length} open case(s); ${sv.Critical} critical alert(s) require continued monitoring into the next shift.</div>`;
  } else if(id==='incident'){
    const inc=(anchorId&&state.alerts.find(a=>a.id===anchorId))||state.alerts.find(a=>['Contained','Closed'].includes(a.status))||state.alerts.find(a=>a.sev==='Critical')||state.alerts[0];
    const intel=intelFor(inc.srcIp);
    title='Incident Report — '+inc.id;
    body=`<div class="kv mb"><div class="k">Incident ID</div><div class="v">${inc.id}</div>
      <div class="k">Classification</div><div class="v">${inc.cat}</div><div class="k">Severity</div><div class="v">${inc.sev}</div>
      <div class="k">Status</div><div class="v">${inc.status}</div><div class="k">Affected Host</div><div class="v">${inc.host}</div>
      <div class="k">Account</div><div class="v">${inc.user}</div><div class="k">Detected By</div><div class="v">${inc.source}</div></div>
      <div class="section-divider">Indicators of Compromise</div>
      <div class="note-item">IP ${inc.srcIp} (${intel.verdict}, ${intel.country}, ${intel.family}) · Domain ${inc.domain||'n/a'} · Hash ${inc.hash?inc.hash.slice(0,24)+'…':'n/a'}</div>
      <div class="section-divider">MITRE ATT&CK</div>
      <div class="note-item">${inc.mitre.map(x=>x+' — '+mitreName(x)).join(' · ')||'n/a'}</div>
      <div class="section-divider">Response Actions</div>
      <div class="note-item">${(state.respLog||[]).filter(r=>r.txt.includes(inc.id)).map(r=>r.txt).join('<br>')||'Containment pending — see Response view.'}</div>`;
  } else if(id==='exec'){
    const slaMet=Math.max(0,Math.min(100,100-(total?m.fp/total*100:0)*0.4)).toFixed(0);
    title='Executive Summary';
    body=`<div class="note-item" style="background:var(--bg)">Security posture summary for leadership · ${fmtDate(now)}</div>
      <div class="section-divider">Posture at a Glance</div>
      <div class="kv mb"><div class="k">Threat Level</div><div class="v">${sv.Critical>3?'ELEVATED':sv.Critical>0?'GUARDED':'NORMAL'}</div>
      <div class="k">Alerts Handled</div><div class="v">${total}</div><div class="k">Incidents Closed</div><div class="v">${state.alerts.filter(a=>a.status==='Closed').length}</div>
      <div class="k">SLA Compliance</div><div class="v">${slaMet}%</div><div class="k">MTTD / MTTR</div><div class="v">${mttd}m / ${mttr}m</div></div>
      <div class="section-divider">Key Message</div>
      <div class="note-item">The SOC processed ${total} alerts this period with ${m.escalated} escalations and ${m.contained} containment actions. ${sv.Critical>0?sv.Critical+' critical threat(s) are under active management.':'No critical threats are currently outstanding.'} Detection and response times remain ${(mttr!=='—'&&+mttr<20)?'within':'near'} defined SLA targets.</div>
      <div class="section-divider">Recommended Investments</div>
      <div class="note-item">${pick(['Expand EDR coverage to remaining endpoints.','Enforce phishing-resistant MFA org-wide.','Increase L2 staffing to reduce escalation backlog.','Mature automated containment playbooks.'])}</div>`;
  } else if(id==='intel'){
    const ips={},doms={};
    state.alerts.forEach(a=>{(a.iocs.ip||[]).forEach(i=>ips[i]=(ips[i]||0)+1);(a.iocs.domain||[]).forEach(d=>doms[d]=(doms[d]||0)+1);});
    const topIp=Object.entries(ips).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const topDom=Object.entries(doms).sort((a,b)=>b[1]-a[1]).slice(0,6);
    title='Threat Intelligence Report';
    body=`<div class="note-item" style="background:var(--bg)">Aggregated indicator analysis · ${fmtDate(now)}</div>
      <div class="section-divider">Top Malicious IPs</div>
      <div class="note-item">${topIp.map(([ip,n])=>{const it=intelFor(ip);return `${ip} — ${it.verdict} (${it.country}, ${it.family}) · ${n} hits`;}).join('<br>')||'No IP indicators observed.'}</div>
      <div class="section-divider">Top Suspicious Domains</div>
      <div class="note-item">${topDom.map(([d,n])=>{const it=intelFor(d);return `${d} — ${it.verdict} · risk ${it.score}/100 · ${n} hits`;}).join('<br>')||'No domain indicators observed.'}</div>
      <div class="section-divider">Assessment</div>
      <div class="note-item">Indicators correlate with ${pick(['commodity malware delivery','targeted intrusion activity','opportunistic scanning and brute force','C2 infrastructure reuse'])}. Recommend blocklisting confirmed-malicious indicators and hunting for related artifacts.</div>`;
  } else {
    const c=state.cases[0];
    title='Investigation Report'+(c?' — '+c.id:'');
    if(!c){ body='<div class="empty-hint">No open cases to report on. Escalate an investigation from the L2 workspace first.</div>'; }
    else { const a=state.alerts.find(x=>x.id===c.anchor)||state.alerts[0];
      body=`<div class="kv mb"><div class="k">Case</div><div class="v">${c.id}</div><div class="k">Title</div><div class="v">${c.title}</div>
        <div class="k">Owner</div><div class="v">${c.owner}</div><div class="k">Severity</div><div class="v">${c.sev}</div>
        <div class="k">Stage</div><div class="v">${LIFECYCLE[c.stage]||'In Progress'}</div><div class="k">Anchor Alert</div><div class="v">${c.anchor}</div></div>
        <div class="section-divider">Findings</div>
        <div class="note-item">${(a.notes||[]).map(n=>'• '+n.txt).join('<br>')||'Investigation in progress; correlated '+relatedAlerts(a).length+' related event(s) sharing IOCs with the anchor alert.'}</div>
        <div class="section-divider">ATT&CK Techniques</div>
        <div class="note-item">${(c.mitre||[]).map(x=>x+' — '+mitreName(x)).join(' · ')||'n/a'}</div>
        <div class="section-divider">Recommended Actions</div>
        <div class="note-item">${pick(['Isolate affected host and reset credentials.','Block confirmed-malicious IOCs at the perimeter.','Hunt for lateral movement across peer hosts.','Escalate to incident response for containment.'])}</div>`;
    }
  }
  // stash the current report context for the export helpers
  state._lastReport={id,title,anchorId:anchorId||null};
  openModal(title,`<div style="max-height:55vh;overflow:auto" id="reportBody">${body}</div>
    <div class="btn-row mt">
      <button class="btn primary" onclick="exportReportPDF()">⤓ Export PDF</button>
      <button class="btn" onclick="exportAlertsCSV()">⤓ Alerts CSV</button>
      <button class="btn" onclick="exportExecSummary()">⤓ Executive Summary (.txt)</button>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>`);
}

/* ============================================================
   REPORT EXPORT — PDF / CSV / Executive Summary  (real downloads)
   ============================================================ */
function download(filename,text,mime){
  const blob=new Blob([text],{type:mime||'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}
function plainFromHTML(html){
  const d=document.createElement('div');d.innerHTML=html.replace(/<\/div>/gi,'\n').replace(/<br\s*\/?>(?=)/gi,'\n');
  return (d.textContent||'').replace(/\n{3,}/g,'\n\n').split('\n').map(l=>l.trim()).filter(Boolean).join('\n');
}
function exportReportPDF(){
  const r=state._lastReport||{title:'SOC Report',id:'daily'};
  const bodyEl=document.getElementById('reportBody');
  const text=bodyEl?plainFromHTML(bodyEl.innerHTML):'';
  const jspdf=window.jspdf&&window.jspdf.jsPDF;
  if(!jspdf){ // fallback: download as text if CDN blocked
    download(r.title.replace(/[^\w]+/g,'_')+'.txt',`SOCVERSE — ${r.title}\nGenerated ${fmtDate(new Date())}\n\n`+text,'text/plain');
    toast('warn','PDF LIB UNAVAILABLE','Exported as .txt instead (offline)');return;
  }
  const doc=new jspdf({unit:'pt',format:'a4'});
  const W=doc.internal.pageSize.getWidth();
  // header band
  doc.setFillColor(7,11,20);doc.rect(0,0,W,70,'F');
  doc.setTextColor(34,211,238);doc.setFont('helvetica','bold');doc.setFontSize(18);
  doc.text('SOCVerse',40,34);
  doc.setTextColor(230,238,250);doc.setFontSize(13);doc.text(r.title,40,54);
  doc.setTextColor(120,140,170);doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text(`Generated ${fmtDate(new Date())}  ·  Analyst: ${state.user.name} (${state.user.role})`,40,66);
  // body
  doc.setTextColor(30,40,55);doc.setFontSize(10.5);
  const lines=doc.splitTextToSize(text,W-80);
  let y=92;const ph=doc.internal.pageSize.getHeight();
  lines.forEach(ln=>{ if(y>ph-50){doc.addPage();y=50;} doc.text(ln,40,y);y+=15; });
  doc.setTextColor(150,160,175);doc.setFontSize(8);
  doc.text('SOCVerse — simulated SOC report for training/demonstration.',40,ph-24);
  doc.save(r.title.replace(/[^\w]+/g,'_')+'.pdf');
  toast('ok','PDF EXPORTED',r.title);
}
function exportAlertsCSV(){
  const cols=['id','ts','source','cat','sev','status','host','user','srcIp','destIp','domain','scenario','mitre','stage'];
  const head=cols.join(',');
  const esc=v=>{v=(v==null?'':Array.isArray(v)?v.join('|'):String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const rows=state.alerts.map(a=>cols.map(c=>esc(a[c])).join(','));
  download('socverse_alerts_'+Date.now()+'.csv',[head,...rows].join('\n'),'text/csv');
  toast('ok','CSV EXPORTED',`${state.alerts.length} alerts written`);
}
function exportExecSummary(){
  const m=state.metrics,sv=severityCounts(),total=state.alerts.length;
  const mttd=m.mttdN?(m.mttdSum/m.mttdN).toFixed(1):'—',mttr=m.mttrN?(m.mttrSum/m.mttrN).toFixed(1):'—';
  const slaMet=Math.max(0,Math.min(100,100-(total?m.fp/total*100:0)*0.4)).toFixed(0);
  const closed=state.alerts.filter(a=>a.status==='Closed').length;
  const txt=
`SOCVERSE — EXECUTIVE SUMMARY
Generated: ${fmtDate(new Date())}
Prepared by: ${state.user.name} (${state.user.role})
============================================================

THREAT LEVEL: ${sv.Critical>3?'ELEVATED':sv.Critical>0?'GUARDED':'NORMAL'}

POSTURE AT A GLANCE
  Alerts handled ............ ${total}
  Critical active ........... ${sv.Critical}
  Incidents closed .......... ${closed}
  Open cases ................ ${state.cases.filter(c=>c.status!=='Closed').length}
  SLA compliance ............ ${slaMet}%
  MTTD / MTTR ............... ${mttd}m / ${mttr}m

SEVERITY BREAKDOWN
  Critical ${sv.Critical} · High ${sv.High} · Medium ${sv.Medium} · Low ${sv.Low}

KEY MESSAGE
  The SOC processed ${total} alerts this period with ${m.escalated} escalations
  and ${m.contained} containment actions. ${sv.Critical>0?sv.Critical+' critical threat(s) are under active management.':'No critical threats are currently outstanding.'}
  Detection and response times remain ${(mttr!=='—'&&+mttr<20)?'within':'near'} defined SLA targets.

RECOMMENDED INVESTMENTS
  - Expand EDR coverage to remaining endpoints
  - Enforce phishing-resistant MFA org-wide
  - Mature automated containment playbooks
============================================================
SOCVerse — simulated SOC report for training/demonstration.`;
  download('socverse_executive_summary_'+Date.now()+'.txt',txt,'text/plain');
  toast('ok','SUMMARY EXPORTED','Executive summary downloaded');
}

</script>
